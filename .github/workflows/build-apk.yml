name: Build APK
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-31" \
            "build-tools;34.0.0"
          # 安装CMake和NDK用于地图SDK
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "cmake;3.22.1" \
            "ndk;25.2.9519653" 2>/dev/null || true

      - name: Download SDKs and resources
        run: |
          mkdir -p libs assets fonts
          
          # 下载高德地图3D地图SDK (~25MB)
          curl -sL -o libs/AMap3DMap.jar \
            "https://download.amap.com/sdk/AMap3DMap_10.0.700_amap.apk" 2>/dev/null || true
          
          # 下载高德定位SDK (~10MB)
          curl -sL -o libs/AMapLocation.jar \
            "https://download.amap.com/sdk/AMap_Location_V6.4.0_20250311.jar" 2>/dev/null || true
          
          # 下载高德搜索SDK (~5MB)
          curl -sL -o libs/AMapSearch.jar \
            "https://download.amap.com/sdk/AMap_Search_V9.7.0_20250311.jar" 2>/dev/null || true
          
          # 下载中文字体 (Noto Sans SC, ~15MB)
          curl -sL -o fonts/NotoSansSC-Regular.otf \
            "https://github.com/googlefonts/noto-cjk/releases/download/Sans2.004/03_NotoSansCJKsc.zip" 2>/dev/null || true
          
          # 下载Material Design图标字体 (~2MB)
          curl -sL -o fonts/MaterialIcons-Regular.ttf \
            "https://github.com/google/material-design-icons/raw/master/font/MaterialIcons-Regular.ttf" 2>/dev/null || true
          
          echo "SDKs downloaded:"
          ls -lh libs/ 2>/dev/null || echo "No SDK jars"
          ls -lh fonts/ 2>/dev/null || echo "No fonts"
          
          # 创建占位资源（后续可从CDN下载实际图片）
          mkdir -p app/src/main/res/drawable app/src/main/res/mipmap-hdpi
          
          # 生成启动图标（1x1像素placeholder）
          echo "0000000000000000" > app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true

      - name: Build APK
        run: |
          set -x
          ANDROID_JAR="$ANDROID_HOME/platforms/android-31/android.jar"
          AAPT2="$ANDROID_HOME/build-tools/34.0.0/aapt2"
          D8="$ANDROID_HOME/build-tools/34.0.0/d8"
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          
          mkdir -p build/flat build/gen build/classes build/dex build/apk
          
          # 编译资源
          for f in app/src/main/res/*/*.xml; do
            [ ! -f "$f" ] && continue
            tag="$(basename $(dirname $f))_$(basename $f .xml)"
            $AAPT2 compile -o "build/${tag}.flat" "$f" 2>/dev/null
            unzip -o "build/${tag}.flat" -d build/flat/ 2>/dev/null || true
          done
          
          # 链接资源+Manifest
          $AAPT2 link --manifest app/src/main/AndroidManifest.xml \
            --java build/gen -I "$ANDROID_JAR" --auto-add-overlay \
            $(ls build/flat/* 2>/dev/null | tr '\n' ' ') \
            -o build/apk/resonly.apk 2>&1
          
          # 编译Java源码
          find app/src/main/java -name "*.java" > sources.txt
          
          # 构建classpath（含下载的SDK）
          CP="$ANDROID_JAR"
          for jar in libs/*.jar; do
            [ -f "$jar" ] && CP="$CP:$jar"
          done
          
          javac -d build/classes -cp "$CP" -source 17 -target 17 \
            @sources.txt build/gen/com/sf/riderhelper/R.java 2>&1
          
          echo "Classes: $(find build/classes -name '*.class' | wc -l)"
          
          # DEX编译
          $D8 --lib "$ANDROID_JAR" --release --min-api 26 --output build/dex \
            $(find build/classes -name "*.class") 2>&1 || true
          
          # 如果有SDK jar，把它们也转成dex并合并
          for jar in libs/*.jar; do
            [ -f "$jar" ] && $D8 --lib "$ANDROID_JAR" --release --min-api 26 \
              --output build/dex "$jar" 2>&1 || true
          done
          
          # 打包APK
          cp build/apk/resonly.apk build/apk/unsigned.apk
          (cd build/dex && zip -q -r ../../build/apk/unsigned.apk . 2>/dev/null)
          
          # 添加assets和fonts
          (cd fonts && zip -q -r ../build/apk/unsigned.apk . 2>/dev/null) || true
          
          # 签名
          rm -f debug.keystore
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=D,OU=D,O=D,L=D,S=D,C=US"
          $APKSIGNER sign --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias debug --out build/apk/app-release.apk \
            build/apk/unsigned.apk 2>&1
          
          echo "=== BUILD RESULT ==="
          ls -lh build/apk/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: build/apk/app-release.apk
